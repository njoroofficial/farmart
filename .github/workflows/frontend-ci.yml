# Run on everypush to branch

name: Frontend CI

on:
  push:
    paths:
      - "frontend/**"
  pull_request:
    paths:
      - "frontend/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: pnpm ci

      - name: Lint
        working-directory: frontend
        run: pnpm run lint

      - name: Run tests
        working-directory: frontend
        run: pnpm run test -- --coverage --watchAll=false

      - name: Build check
        working-directory: frontend
        run: pnpm run build
        env:
          REACT_APP_API_URL: https://placeholder-api.example.com
